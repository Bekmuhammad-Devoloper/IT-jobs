services:
  postgres:
    image: postgres:17-alpine
    container_name: yuksalish_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "10432:5432"
    volumes:
      - yuksalish_postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yuksalish_net

  redis:
    image: redis:7-alpine
    container_name: yuksalish_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "10379:6379"
    volumes:
      - yuksalish_redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yuksalish_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yuksalish_backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7d}
      - BOT_TOKEN=${BOT_TOKEN:?BOT_TOKEN is required}
      - CHANNEL_ID=${CHANNEL_ID:?CHANNEL_ID is required}
      - CHANNEL_USERNAME=${CHANNEL_USERNAME:?CHANNEL_USERNAME is required}
      - PORT=3002
      - NODE_ENV=production
      - WEBAPP_URL=${WEBAPP_URL:?WEBAPP_URL is required}
      - ADMIN_URL=${ADMIN_URL:?ADMIN_URL is required}
      - SUPER_ADMIN_IDS=${SUPER_ADMIN_IDS:?SUPER_ADMIN_IDS is required}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:?ADMIN_SECRET_KEY is required}
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - VIEWS_COLLECT_CRON=${VIEWS_COLLECT_CRON:-0 * * * *}
      - RATING_CALC_CRON=${RATING_CALC_CRON:-0 0 * * *}
      - CLEANUP_CRON=${CLEANUP_CRON:-0 0 * * 0}
      - POST_COOLDOWN_DAYS=${POST_COOLDOWN_DAYS:-15}
      - GEMINI_API_KEY=${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2:-}
    ports:
      - "10002:3002"
    volumes:
      - yuksalish_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - yuksalish_net

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: yuksalish_bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CHANNEL_ID=${CHANNEL_ID}
      - CHANNEL_USERNAME=${CHANNEL_USERNAME}
      - WEBAPP_URL=${WEBAPP_URL}
      - API_URL=http://backend:3002/api
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - backend
      - redis
    restart: always
    networks:
      - yuksalish_net

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend:3002/api
    container_name: yuksalish_webapp
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:3002/api
    ports:
      - "10000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - yuksalish_net

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend:3002/api
    container_name: yuksalish_admin
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:3002/api
    ports:
      - "10001:3001"
    depends_on:
      - backend
    restart: always
    networks:
      - yuksalish_net

  nginx:
    image: nginx:alpine
    container_name: yuksalish_nginx
    ports:
      - "10080:80"
      - "10443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - webapp
      - admin
    restart: always
    networks:
      - yuksalish_net
    profiles:
      - standalone

volumes:
  yuksalish_postgres_data:
  yuksalish_redis_data:
  yuksalish_uploads:

networks:
  yuksalish_net:
    driver: bridge
