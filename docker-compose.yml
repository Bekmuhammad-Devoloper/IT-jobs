version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: itjobs_db
    environment:
      POSTGRES_DB: itjobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: itjobs_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itjobs_backend
    env_file: ./backend/.env
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: itjobs_bot
    env_file: ./bot/.env
    depends_on:
      - backend
      - redis
    restart: always

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: itjobs_webapp
    ports:
      - "3000:3000"
    restart: always

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: itjobs_admin
    ports:
      - "3001:3001"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: itjobs_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
      - webapp
      - admin
    restart: always

volumes:
  postgres_data:
  redis_data:
